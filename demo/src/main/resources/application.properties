spring.application.name=demo

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://<YOUR_POSTGRES_HOST>:5432/yourdbname
    username: yourusername
    password: yourpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  redis:
    host: <YOUR_REDIS_HOST>
    port: 6379

# WebSocket STOMP 設定（前端將連線此 endpoint）
stomp:
  endpoint: /ws

# Binance WebSocket 配置（可放在自訂的屬性中）
binance:
  ws-url: wss://stream.binance.com:9443/ws/btcusdt@kline_1m
