server.port=8080

spring.datasource.url=jdbc:postgresql://<YOUR_POSTGRES_HOST>:5432/yourdbname
spring.datasource.username=yourusername
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.data.redis.host=<YOUR_REDIS_HOST>
spring.data.redis.port=6379

# 以下屬性需要自行定義（或透過 @ConfigurationProperties 綁定自訂屬性）
stomp.endpoint=/ws

binance.ws-url=wss://stream.binance.com:9443/ws/btcusdt@kline_1m
